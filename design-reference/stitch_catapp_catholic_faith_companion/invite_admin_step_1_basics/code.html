<!-- Page Title -->
<header class="mb-stack-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary">Invite Admin</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-2 italic">Fill in the basic information to begin the invitation process.</p>
</header>
<!-- 3-Step Progress Indicator -->
<div class="mb-stack-lg py-4">
<div class="flex items-start justify-between w-full relative">
<!-- Progress Line -->
<div class="absolute top-5 left-0 w-full h-[2px] bg-outline-variant z-0"></div>
<div class="absolute top-5 left-0 w-1/3 h-[2px] bg-tertiary-fixed-dim z-0"></div>
<!-- Step 1: Active -->
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-on-primary shadow-sm border-4 border-background">
<span class="font-label-md">1</span>
</div>
<span class="font-label-md text-label-md text-primary font-bold">Personal Info</span>
</div>
<!-- Step 2: Inactive -->
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-surface-container-highest border-2 border-outline-variant flex items-center justify-center text-on-surface-variant shadow-sm bg-background">
<span class="font-label-md">2</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Role &amp; Access</span>
</div>
<!-- Step 3: Inactive -->
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-surface-container-highest border-2 border-outline-variant flex items-center justify-center text-on-surface-variant shadow-sm bg-background">
<span class="font-label-md">3</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Review</span>
</div>
</div>
</div>
<!-- Form Card -->
<div class="bg-surface-container-lowest rounded-xl p-stack-lg shadow-[0_1px_3px_0_rgba(0,0,0,0.04)] border border-surface-variant/30">
<form class="space-y-stack-lg">
<!-- Full Name -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="full_name">Full Name</label>
<input class="w-full h-14 px-4 bg-transparent border border-outline rounded-lg font-body-md text-body-md text-on-surface focus:border-primary transition-all form-input-focus" id="full_name" placeholder="e.g. Chinelo Okoro" type="text"/>
</div>
<!-- Email Address -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email Address</label>
<input class="w-full h-14 px-4 bg-transparent border border-outline rounded-lg font-body-md text-body-md text-on-surface focus:border-primary transition-all form-input-focus" id="email" placeholder="chinelo.okoro@example.com" type="email"/>
</div>
<!-- Phone Number (Optional) -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="phone">Phone Number (Optional)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-md">+234</span>
<input class="w-full h-14 pl-16 pr-4 bg-transparent border border-outline rounded-lg font-body-md text-body-md text-on-surface focus:border-primary transition-all form-input-focus" id="phone" placeholder="800 000 0000" type="tel"/>
</div>
</div>

</div>
</div>

<span class="material-symbols-outlined" data-weight="fill">auto_stories</span>
<span class="font-label-md text-label-md">Content</span>

<span class="font-label-md text-label-md">Stats</span>

</nav>
<script>
        // Simple micro-interaction for the continue button
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="flex items-center gap-2"><span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span> Processing...</span>';
            btn.disabled = true;
            
            setTimeout(() => {
                alert('Success! Moving to Step 2...');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 1000);
        });

        // Focus interaction for accessibility and flair
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').classList.remove('text-primary');
            });
        });
    </script>
