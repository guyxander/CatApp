<script>
        // Simple Micro-interaction for filter chips
        const filterChips = document.querySelectorAll('button[class*="rounded-full"]');
        filterChips.forEach(chip => {
            chip.addEventListener('click', () => {
                // Reset others (very basic logic for demo)
                filterChips.forEach(c => {
                    if (c !== chip && c.classList.contains('bg-primary')) {
                        c.classList.remove('bg-primary', 'text-on-primary');
                        c.classList.add('bg-surface-container-highest', 'text-on-surface-variant', 'border', 'border-outline-variant');
                        const icon = c.querySelector('.material-symbols-outlined');
                        if (icon) icon.style.fontVariationSettings = "'FILL' 0";
                    }
                });
                
                // Toggle active state
                if (!chip.classList.contains('bg-primary')) {
                    chip.classList.add('bg-primary', 'text-on-primary');
                    chip.classList.remove('bg-surface-container-highest', 'text-on-surface-variant', 'border', 'border-outline-variant');
                    const icon = chip.querySelector('.material-symbols-outlined');
                    if (icon) icon.style.fontVariationSettings = "'FILL' 1";
                }
            });
        });
    </script>
