<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CatApp - Create New Post</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#32302a",
                        "surface-container-high": "#ede7df",
                        "secondary-fixed-dim": "#efb2f1",
                        "error": "#ba1a1a",
                        "surface-container-low": "#f9f3ea",
                        "secondary": "#7e4c83",
                        "on-secondary-fixed": "#33053b",
                        "on-primary-container": "#c27c9a",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#64346a",
                        "on-primary-fixed": "#380822",
                        "surface-container": "#f3ede4",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#fff9ef",
                        "on-tertiary-fixed-variant": "#5d4200",
                        "surface-container-highest": "#e7e2d9",
                        "on-tertiary-container": "#b58a2c",
                        "tertiary-fixed-dim": "#f0bf5c",
                        "primary-fixed": "#ffd8e6",
                        "tertiary-container": "#382700",
                        "on-primary": "#ffffff",
                        "secondary-container": "#fec0ff",
                        "on-secondary-container": "#7b4980",
                        "inverse-on-surface": "#f6f0e7",
                        "surface-tint": "#884b67",
                        "tertiary": "#1f1400",
                        "surface-dim": "#dfd9d1",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#261900",
                        "primary-container": "#4a1731",
                        "secondary-fixed": "#ffd6fd",
                        "on-primary-fixed-variant": "#6d344f",
                        "outline-variant": "#d5c2c7",
                        "on-surface": "#1d1b16",
                        "surface-variant": "#e7e2d9",
                        "outline": "#837378",
                        "primary": "#30021c",
                        "on-surface-variant": "#514348",
                        "surface-bright": "#fff9ef",
                        "background": "#fff9ef",
                        "on-secondary": "#ffffff",
                        "on-background": "#1d1b16",
                        "inverse-primary": "#fdb0d0",
                        "tertiary-fixed": "#ffdea4",
                        "primary-fixed-dim": "#fdb0d0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "margin-tablet": "24px",
                        "gutter": "16px",
                        "stack-md": "16px",
                        "stack-lg": "24px",
                        "unit": "4px",
                        "margin-mobile": "16px",
                        "margin-desktop": "32px"
                    },
                    "fontFamily": {
                        "label-md": ["Work Sans"],
                        "headline-lg-mobile": ["\"Source Serif 4\""],

                    "fontSize": {

                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                        "title-lg": ["22px", {"lineHeight": "28px", "fontWeight": "500"}],
                        "display-lg": ["57px", {"lineHeight": "64px", "letterSpacing": "-0.25px", "fontWeight": "400"}],

                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                    }
                },
            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            background-color: #fff9ef; /* surface-bright */
            color: #1d1b16; /* on-surface */
            -webkit-font-smoothing: antialiased;
        }
        .sacred-gradient {
            background: linear-gradient(180deg, rgba(247, 241, 232, 0) 0%, rgba(247, 241, 232, 1) 100%);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d5c2c7;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-body-md text-body-md">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-margin-mobile w-full h-16 bg-surface border-b border-outline-variant">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-primary-container/10 transition-colors duration-200 rounded-full" onclick="history.back()">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Create New Post</h1>
</div>
<div class="flex items-center">
<div class="w-10 h-10 rounded-full overflow-hidden border border-outline-variant bg-surface-container">
<img class="w-full h-full object-cover" data-alt="A dignified close-up portrait of a Nigerian young man with a serene expression, wearing a subtle traditional patterned shirt. The lighting is warm and cinematic, suggesting a sacred and contemplative environment. The overall aesthetic is high-quality digital photography with a focus on human connection and community." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCk74Mv-3ESPNYHuXxbssmouVb1-iDKMsDQRQTk3SWjMMaxYXw-Sht8icvY5bIu7zz33C2PHWInhN0cyx-80lRaHUixKUNb31nFd_ZFJDI4y9-uSYb1SV_l45KDyANXQYCkdasd3h9mgr9Djs-wYcgX6U9cd2gja-rifDcw9D84RId2fSW8Z33Ng_hD3bZQjcPL3paBWPVpbG9cgCFSY65khxkNXmtGpD1zhdJ3CgHe56cYdenPpRdq"/>
</div>
</div>
</header>
<main class="flex-grow pt-20 pb-24 px-margin-mobile md:max-w-3xl md:mx-auto w-full">
<div class="flex flex-col gap-stack-lg">
<!-- Category Selector (Horizontal Scroll Chips) -->
<section>
<h2 class="font-label-md text-label-md text-on-surface-variant mb-stack-sm ml-1">SELECT CATEGORY</h2>
<div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
<button class="flex-shrink-0 bg-secondary-container text-on-secondary-container px-4 py-2 rounded-full border border-secondary flex items-center gap-2 transition-all active:scale-95">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">prayer_times</span>
<span class="font-label-md text-label-md">Prayer Requests</span>
</button>
<button class="flex-shrink-0 bg-surface-container text-on-surface-variant px-4 py-2 rounded-full border border-outline-variant flex items-center gap-2 hover:bg-surface-container-highest transition-all active:scale-95">
<span class="material-symbols-outlined text-[20px]">groups</span>
<span class="font-label-md text-label-md">Testimonies</span>
</button>
<button class="flex-shrink-0 bg-surface-container text-on-surface-variant px-4 py-2 rounded-full border border-outline-variant flex items-center gap-2 hover:bg-surface-container-highest transition-all active:scale-95">
<span class="material-symbols-outlined text-[20px]">church</span>
<span class="font-label-md text-label-md">Parish News</span>
</button>
<button class="flex-shrink-0 bg-surface-container text-on-surface-variant px-4 py-2 rounded-full border border-outline-variant flex items-center gap-2 hover:bg-surface-container-highest transition-all active:scale-95">
<span class="material-symbols-outlined text-[20px]">menu_book</span>
<span class="font-label-md text-label-md">Reflections</span>
</button>
</div>
</section>
<!-- Form Body -->
<div class="bg-surface-container-lowest rounded-xl p-stack-md shadow-sm border border-outline-variant flex flex-col gap-stack-md">
<!-- Title Field -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant px-1" for="post-title">Post Title</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-title-lg text-title-lg transition-all placeholder:text-on-surface-variant/50" id="post-title" placeholder="What's on your heart?" type="text"/>
</div>
<!-- Body Text Field -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant px-1" for="post-body">Message</label>
<textarea class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-body-lg text-body-lg transition-all custom-scrollbar placeholder:text-on-surface-variant/50 resize-none" id="post-body" placeholder="Share your prayer request or reflection with the community..." rows="8"></textarea>
</div>
<!-- Attachments Section -->
<div class="hidden w-full h-48 rounded-lg overflow-hidden border border-outline-variant relative group" id="attachment-preview">
<img class="w-full h-full object-cover" data-alt="A beautiful, serene landscape of the Nigerian countryside at sunset, with golden light filtering through acacia trees and a distant humble chapel. The atmosphere is peaceful and spiritual, rendered in a soft-focus digital painting style that emphasizes warmth and hope." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBpWjOALKeagGKJXBmeK73iZchZ_NikVJIQzrB-MIemdbj27q4SFfjTEem7jbhrFFxurx4X96eo5eNOeM1sYRkT5jZ644D37dJo2tvTJplFZmc35urnk5U6j9PtK2cJUswJeXzefdmRu0nYv5iGKTd4bUfOkPtYfRvjvgzzJknqKUWvATEG431RxNddeVRERya-QyD7PqvfZ2cn-3GJAphHu8IMv0Oh29lDzwEQfaqwFzbdDxG1QVnI"/>
<button class="absolute top-2 right-2 bg-black/50 text-white p-1 rounded-full hover:bg-black/70 transition-colors" onclick="this.parentElement.classList.add('hidden')">
<span class="material-symbols-outlined text-[18px]">close</span>
</button>
</div>
<div class="flex flex-wrap items-center justify-between gap-4 pt-2 border-t border-outline-variant/30">
<!-- Action Row: Image & Anonymous -->
<div class="flex items-center gap-4">
<button class="flex items-center gap-2 text-secondary font-label-md text-label-md hover:bg-secondary-container/20 px-3 py-2 rounded-lg transition-colors" onclick="document.getElementById('attachment-preview').classList.remove('hidden')">
<span class="material-symbols-outlined">add_a_photo</span>
<span>Attach Image/Photo</span>
</button>
<div class="flex items-center gap-3 ml-2">
<span class="font-label-md text-label-md text-on-surface-variant">Post Anonymously</span>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-secondary"></div>
</label>
</div>
</div>
</div>
</div>
<!-- Guidelines / Tip Card -->
<div class="bg-tertiary-fixed text-on-tertiary-fixed-variant p-stack-md rounded-xl flex gap-stack-md items-start">
<span class="material-symbols-outlined mt-1">info</span>
<div>
<p class="font-label-md text-label-md font-bold mb-1">Community Guidelines</p>
<p class="font-label-md text-label-md opacity-90 leading-relaxed">Please ensure your post is respectful and follows our communal standards for prayer and fellowship. Posts are visible to all members of your parish and the global CatApp community.</p>
</div>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full z-50 bg-surface-container-low border-t border-outline-variant p-margin-mobile flex justify-center">
<button class="w-full max-w-3xl bg-primary text-on-primary font-title-lg text-title-lg py-4 rounded-xl shadow-lg hover:shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
            Share with Community
        </button>
</div>
<!-- Background Atmospheric Effect (Shader Placeholder) -->
<div class="fixed inset-0 -z-10 pointer-events-none opacity-20">
<!-- We will use a subtle div pattern since no specific animation was requested, but keeping the "Sacred Space" feel -->
<div class="absolute inset-0 bg-[radial-gradient(#d5c2c7_1px,transparent_1px)] [background-size:24px_24px]"></div>
</div>
<script>
        // Simple micro-interaction for the input fields
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label')?.classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label')?.classList.remove('text-primary');
            });
        });

        // Category selection logic
        const categoryButtons = document.querySelectorAll('section button');
        categoryButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryButtons.forEach(b => {
                    b.classList.remove('bg-secondary-container', 'text-on-secondary-container', 'border-secondary');
                    b.classList.add('bg-surface-container', 'text-on-surface-variant', 'border-outline-variant');
                    const icon = b.querySelector('.material-symbols-outlined');
                    if(icon) icon.style.fontVariationSettings = "'FILL' 0";
                });
                btn.classList.add('bg-secondary-container', 'text-on-secondary-container', 'border-secondary');
                btn.classList.remove('bg-surface-container', 'text-on-surface-variant', 'border-outline-variant');
                const icon = btn.querySelector('.material-symbols-outlined');
                if(icon) icon.style.fontVariationSettings = "'FILL' 1";
            });
        });
    </script>
</body></html>
